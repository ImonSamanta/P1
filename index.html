} 
body{
    margin-top: 100px;
    min-height:100vh;
    
    background:
        radial-gradient(circle at 20% 20%, rgba(0,120,255,0.25), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,0.15), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(0,100,255,0.2), transparent 35%),
        linear-gradient(
            135deg,
            #020202 0%,
            #050a15 25%,
            #081428 50%,
            #03060d 75%,
            #000000 100%
        );

    background-attachment: fixed;
    overflow-x:hidden;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
        repeating-linear-gradient(
            45deg,
            transparent 0px,
            transparent 60px,
            rgba(0,140,255,0.03) 61px,
            rgba(0,140,255,0.03) 62px
        );

    pointer-events:none;
}

body::after{
    content:"";
    position:fixed;
    inset:0;

    background-image:
        radial-gradient(circle, rgba(0,180,255,.8) 1px, transparent 1px);

    background-size:80px 80px;
    opacity:.15;

    animation: drift 25s linear infinite;
    pointer-events:none;
}

@keyframes drift{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-100px);
    }
}
